services:
  - type: web
    name: ajp-ml-portal-simple
    runtime: python
    plan: free
    buildCommand: "true"
    startCommand: "python app.py"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MODEL_MODE
        value: simple-placeholder
